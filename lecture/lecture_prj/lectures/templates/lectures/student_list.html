<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>학생 목록</h1>
    <div>
        {% for s in students %}<br>
            <p>{{ s.student_id }} - {{ s.name }}></p>
                <p>수강 강의 목록: </p>
                {% for e in s.lecturestudent.all %}
                    <p>- [{{ e.lecture.code }}] {{ e.lecture.title }} - 수강 신청일 {{ e.enrolled_at }}</p>
                {% empty %}
                    등록된 학생이 없습니다.
                {% endfor %}
        {% empty %}
            등록된 학생이 없습니다.
        {% endfor %}
    </div>
</body>
</html>

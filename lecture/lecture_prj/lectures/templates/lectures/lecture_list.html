<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>강의 목록</h1>
    {% for l in lectures %}
        <hr>
        <p>[{{ l.code }}] {{ l.title }} -{{ l.professor.name }}</p>
        <p>수강생 목록:</p>
        {% for s in l.student.all %}
        {{ s.student_id }} - {{ s.name }}
        <br>
        {% empty %}
            등록된 수강생이 없습니다.
        {% endfor %}
    {% empty %}
        등록된 강의가 없습니다.
    {% endfor %}
</body>
</html>
